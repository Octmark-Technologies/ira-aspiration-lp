    <script>
        (function () {
            try {
                /* =============================
                   CONFIG
                ============================= */
                var ENDPOINT = "https://api.octmarktechnologies.com/events/pixel";
                var CLIENT_KEY = "36c04e0a-ab6c-41d4-85f0-2aea39df450d";

                /* =============================
                   HELPERS (ES5 ONLY)
                ============================= */
                var getParam = function (name) {
                    var match = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
                    return match && decodeURIComponent(match[1].replace(/\+/g, " ")) || null;
                };

                var nowISO = function () {
                    return new Date().toISOString();
                };

                var send = function (payload) {
                    try {
                        var xhr = new XMLHttpRequest();
                        xhr.open("POST", ENDPOINT, true);
                        xhr.setRequestHeader("Content-Type", "application/json");
                        xhr.setRequestHeader("x-client-key", CLIENT_KEY);
                        xhr.send(JSON.stringify(payload));
                    } catch (e) { }
                };

                /* =============================
                   SESSION + JOURNEY STATE
                ============================= */
                var sess = sessionStorage;

                if (!sess.getItem("oct_session_id")) {
                    sess.setItem(
                        "oct_session_id",
                        "sess_" + Math.random().toString(36).substr(2, 9)
                    );
                }

                if (!sess.getItem("oct_entry_page")) {
                    sess.setItem("oct_entry_page", window.location.pathname || "/");
                }

                if (!sess.getItem("oct_entry_source")) {
                    var src = "direct";
                    if (getParam("gclid")) src = "google_paid";
                    else if (getParam("fbclid")) src = "meta_paid";
                    else if (getParam("utm_source")) src = getParam("utm_source");
                    sess.setItem("oct_entry_source", src);
                }

                var prevPage = sess.getItem("oct_last_page");
                var step = parseInt(sess.getItem("oct_step") || "0", 10) + 1;

                sess.setItem("oct_last_page", window.location.pathname || "/");
                sess.setItem("oct_step", step);

                /* =============================
                   CONTEXT BUILDER
                ============================= */
                var baseContext = function () {
                    return {
                        user_agent: navigator.userAgent,
                        page: {
                            url: window.location.href,
                            referrer: document.referrer || null
                        },
                        utm: {
                            source: getParam("utm_source"),
                            medium: getParam("utm_medium"),
                            campaign: getParam("utm_campaign"),
                            term: getParam("utm_term"),
                            content: getParam("utm_content")
                        },
                        click_ids: {
                            gclid: getParam("gclid"),
                            fbclid: getParam("fbclid")
                        },
                        journey: {
                            session_id: sess.getItem("oct_session_id"),
                            entry_source: sess.getItem("oct_entry_source"),
                            entry_page: sess.getItem("oct_entry_page"),
                            previous_page: prevPage,
                            current_page: window.location.pathname || "/",
                            step: step
                        }
                    };
                };

                var sendEvent = function (name) {
                    send({
                        source: "pixel",
                        event: {
                            name: name,
                            timestamp: nowISO()
                        },
                        user: {
                            hashed: {
                                email: window.__oct_email || null,
                                phone: window.__oct_phone || null
                            }
                        },
                        context: baseContext()
                    });
                };

                var isInput = function (el) {
                    if (!el || !el.tagName) return false;
                    var t = el.tagName.toLowerCase();
                    return t === "input" || t === "textarea" || t === "select";
                };

                /* =============================
                   L1 — PAGE VIEW
                ============================= */
                sendEvent("PageView");

                /* =============================
                   L2 — SCROLL DEPTH
                ============================= */
                var fired = {};
                window.addEventListener("scroll", function () {
                    var h = document.documentElement.scrollHeight || document.body.scrollHeight;
                    var s = Math.round((window.pageYOffset + window.innerHeight) / h * 100);

                    if (s >= 25 && !fired[25]) { fired[25] = true; sendEvent("Scroll_25"); }
                    if (s >= 50 && !fired[50]) { fired[50] = true; sendEvent("Scroll_50"); }
                    if (s >= 75 && !fired[75]) { fired[75] = true; sendEvent("Scroll_75"); }
                    if (s >= 100 && !fired[100]) { fired[100] = true; sendEvent("Scroll_100"); }
                });

                /* =============================
                   L2 — TIME ON PAGE
                ============================= */
                setTimeout(function () { sendEvent("TimeOnPage_15s"); }, 15000);
                setTimeout(function () { sendEvent("TimeOnPage_30s"); }, 30000);
                setTimeout(function () { sendEvent("TimeOnPage_60s"); }, 60000);

                /* =============================
                   L2 — CLICKS
                ============================= */
                document.addEventListener("click", function (e) {
                    var el = e.target;
                    if (!el) return;

                    var href = el.getAttribute && el.getAttribute("href");
                    var tag = el.tagName ? el.tagName.toLowerCase() : "";

                    if (href) {
                        if (href.indexOf("wa.me") !== -1 || href.indexOf("whatsapp") !== -1) {
                            sendEvent("WhatsApp_Click");
                        } else if (href.indexOf("tel:") === 0) {
                            sendEvent("Call_Click");
                        } else if (href.indexOf("mailto:") === 0) {
                            sendEvent("Email_Click");
                        } else {
                            sendEvent("Deep_Link_Click");
                        }
                    }

                    if (tag === "button" || tag === "a") {
                        sendEvent("CTA_Click");
                    }
                }, true);

                /* =============================
                   L2 — FORM INTENT (POPUPS SAFE)
                ============================= */
                var formStarted = false;

                document.addEventListener("focus", function (e) {
                    if (isInput(e.target) && !formStarted) {
                        formStarted = true;
                        sendEvent("Form_Start");
                    }
                }, true);

                document.addEventListener("change", function (e) {
                    if (isInput(e.target)) {
                        sendEvent("Form_Field_Change");
                    }
                }, true);

                document.addEventListener("submit", function () {
                    sendEvent("Form_Submit_Attempt");
                }, true);

            } catch (e) {
                console.warn("Octrackit pixel error", e);
            }
        })();
    </script>
